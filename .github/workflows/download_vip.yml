name: VIP Dedicated Download

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'شناسه کاربر تلگرام'
        required: true
        type: string
      zip_password:
        description: 'رمز فایل فشرده'
        required: true
        type: string
      worker_url:
        description: 'آدرس Worker ربات VIP'
        required: false
        default: 'https://vip.shoposhal.workers.dev'
        type: string
      file_url:
        description: 'لینک مستقیم فایل (خالی = یوتیوب یا تلگرام)'
        required: false
        type: string
      file_id:
        description: 'شناسه فایل تلگرام (خالی = لینک)'
        required: false
        type: string
      media_url:
        description: 'لینک یوتیوب (خالی = دانلود فایل)'
        required: false
        type: string
      desired_quality:
        description: 'کیفیت مورد نظر (فقط یوتیوب)'
        required: false
        default: '720'
        type: choice
        options:
          - '1080'
          - '720'
          - '480'
          - '360'
      min_quality:
        description: 'حداقل کیفیت (فقط یوتیوب)'
        required: false
        default: '360'
        type: choice
        options:
          - '720'
          - '480'
          - '360'
          - '240'
      max_size_mb:
        description: 'حداکثر حجم مگابایت'
        required: false
        default: '10240'
        type: string

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

      - name: Notify Worker Started
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/started" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\"}" || true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y p7zip-full wget
          pip install pyrogram tgcrypto --quiet --break-system-packages || pip install pyrogram tgcrypto --quiet

      - name: Setup yt-dlp
        if: ${{ github.event.inputs.media_url != '' }}
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Create YouTube Cookies
        if: ${{ github.event.inputs.media_url != '' }}
        env:
          COOKIE_BASE64: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$COOKIE_BASE64" ]; then echo "$COOKIE_BASE64" | base64 -d > cookies.txt; fi
        shell: bash

      - name: Select YouTube Quality
        if: ${{ github.event.inputs.media_url != '' }}
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
          MAX_SIZE_MB: ${{ github.event.inputs.max_size_mb }}
          DESIRED_Q: ${{ github.event.inputs.desired_quality }}
          MIN_Q: ${{ github.event.inputs.min_quality }}
        run: |
          COOKIE_ARG=""; [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"
          MAX_BYTES=$((${MAX_SIZE_MB:-4096} * 1024 * 1024))
          SELECTED=""
          for q in 1080 720 480 360 240 144; do
            if [ $q -le ${DESIRED_Q:-720} ] && [ $q -ge ${MIN_Q:-360} ]; then
              SIZE_INFO=$(yt-dlp $COOKIE_ARG --format "bestvideo[height<=${q}]+bestaudio/best[height<=${q}]" --print "%(filesize,filesize_approx)s" "$YT_URL" 2>/dev/null || echo "0")
              FILE_SIZE=$(echo "$SIZE_INFO" | head -1 | tr -d '[:space:]')
              [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "NA" ] || [ "$FILE_SIZE" = "None" ] && FILE_SIZE=0
              if [ "$FILE_SIZE" -eq 0 ] || [ "$FILE_SIZE" -le "$MAX_BYTES" ]; then SELECTED=$q; break; fi
            fi
          done
          [ -z "$SELECTED" ] && SELECTED=${MIN_Q:-360}
          echo "selected_quality=$SELECTED" >> $GITHUB_ENV
        shell: bash

      - name: Download YouTube Video
        if: ${{ github.event.inputs.media_url != '' }}
        env:
          YT_URL: ${{ github.event.inputs.media_url }}
          SELECTED_QUALITY: ${{ env.selected_quality }}
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/progress" -H "Content-Type: application/json" -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"download\",\"percent\":10}" || true
          COOKIE_ARG=""; [ -f cookies.txt ] && COOKIE_ARG="--cookies cookies.txt"
          yt-dlp $COOKIE_ARG \
            --format "bestvideo[height<=${SELECTED_QUALITY}]+bestaudio/best[height<=${SELECTED_QUALITY}]" \
            --merge-output-format mp4 --output "video.%(ext)s" --no-playlist \
            --retries 5 --fragment-retries 5 --retry-sleep 5 "$YT_URL"
          VIDEO_FILE=$(ls video.* 2>/dev/null | head -1)
          [ -z "$VIDEO_FILE" ] && { echo "File not found!"; exit 1; }
          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
          echo "DOWNLOAD_FILE=$VIDEO_FILE" >> $GITHUB_ENV
          echo "DOWNLOAD_SIZE=$FILE_SIZE" >> $GITHUB_ENV
        shell: bash

      - name: Download File (Link or Telegram)
        if: ${{ github.event.inputs.media_url == '' }}
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          INPUT_FILE_URL: ${{ github.event.inputs.file_url }}
          INPUT_FILE_ID: ${{ github.event.inputs.file_id }}
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/progress" -H "Content-Type: application/json" -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"download\",\"percent\":10}" || true
          if [ -n "$INPUT_FILE_URL" ] && [ "$INPUT_FILE_URL" != "null" ] && [ "$INPUT_FILE_URL" != "" ]; then
            ORIGINAL_NAME=$(basename "$INPUT_FILE_URL" | cut -d '?' -f1)
            [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file"
            wget -c -t 20 -T 60 --retry-connrefused --waitretry=5 -O "$ORIGINAL_NAME" "$INPUT_FILE_URL"
          elif [ -n "$INPUT_FILE_ID" ] && [ "$INPUT_FILE_ID" != "null" ] && [ "$INPUT_FILE_ID" != "" ]; then
            cat << 'PYEOF' > dl_script.py
          import os, asyncio
          from pyrogram import Client
          async def main():
              app = Client("session", session_string=os.environ['TG_SESSION_STRING'],
                  api_id=int(os.environ['TG_API_ID']), api_hash=os.environ['TG_API_HASH'])
              async with app:
                  path = await app.download_media(os.environ['INPUT_FILE_ID'])
                  open("filename.txt","w").write(path or "")
          asyncio.run(main())
          PYEOF
            python dl_script.py
            ORIGINAL_NAME=$(cat filename.txt)
          else
            echo "No file_url or file_id!"; exit 1
          fi
          [ ! -s "${ORIGINAL_NAME:-downloaded_file}" ] && { echo "Empty file!"; exit 1; }
          FILE_SIZE=$(stat -c%s "$ORIGINAL_NAME" 2>/dev/null || echo "0")
          echo "DOWNLOAD_FILE=$ORIGINAL_NAME" >> $GITHUB_ENV
          echo "DOWNLOAD_SIZE=$FILE_SIZE" >> $GITHUB_ENV
        shell: bash

      - name: Notify Worker Compress
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/progress" -H "Content-Type: application/json" -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"compress\",\"percent\":55}" || true

      - name: Compress with Password
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=1 -v95m "archive.7z" "${{ env.DOWNLOAD_FILE }}"
          rm -f "${{ env.DOWNLOAD_FILE }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get Chunks Count
        id: chunks
        run: |
          CHUNKS=$(ls archive.7z.* 2>/dev/null | wc -l)
          [ "$CHUNKS" -eq 0 ] && CHUNKS=1
          echo "total=$CHUNKS" >> $GITHUB_OUTPUT

      - name: Upload Chunks to Branch
        id: upload
        run: |
          FILE_TYPE="file"
          [ -n "${{ github.event.inputs.media_url }}" ] && FILE_TYPE="yt"
          BRANCH_NAME="vip_${FILE_TYPE}_${{ github.event.inputs.user_id }}_$(date +%s)"

          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . 2>/dev/null || true
          echo "# VIP ${{ github.event.inputs.user_id }}" > README.md

          chunks=(archive.7z.*)
          total=${#chunks[@]}
          [ $total -eq 0 ] && { chunks=(archive.7z); total=1; }

          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/progress" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":70,\"total_chunks\":$total}" || true

          batch_size=2; start=0; uploaded=0
          while [ $start -lt $total ]; do
            end=$((start + batch_size - 1))
            [ $end -ge $total ] && end=$((total - 1))
            for i in $(seq $start $end); do git add "${chunks[$i]}" 2>/dev/null || true; done
            git add README.md
            git commit -m "vip $((start+1))-$((end+1))/$total"
            for attempt in {1..5}; do git push origin "$BRANCH_NAME" && break; sleep 10; done
            uploaded=$((end+1))
            PERCENT=$((70 + uploaded * 28 / total))
            curl -s -X POST "${{ github.event.inputs.worker_url }}/api/progress" \
              -H "Content-Type: application/json" \
              -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"stage\":\"upload\",\"percent\":$PERCENT,\"uploaded_chunks\":$uploaded}" || true
            start=$((end + 1)); sleep 2
          done
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        shell: bash

      - name: Notify Worker Complete
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/complete" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"branch\":\"${{ env.BRANCH_NAME }}\",\"file_size\":${{ env.DOWNLOAD_SIZE }}}"

      - name: Notify Worker Failed
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}/api/failed" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"${{ github.event.inputs.user_id }}\",\"error\":\"Workflow failed\"}"
